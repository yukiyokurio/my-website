<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朝ごはん栄養バランスチェッカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap');
        
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #fffbeb;
        }

        .food-card {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .food-card:active {
            transform: scale(0.95);
        }

        /* Tab Styles */
        .tab-btn {
            transition: all 0.3s;
        }
        .tab-btn.active {
            transform: translateY(-4px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .tray-area {
            background-image: radial-gradient(#fbbf24 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            min-height: 180px;
        }

        .nutrient-bar {
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in {
            animation: popIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="p-2 md:p-4">
    <div class="max-w-7xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-4 md:border-8 border-amber-400">
        <!-- Header -->
        <header class="bg-amber-400 p-4 md:p-6 text-white text-center shadow-md">
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-wider">☀️ 朝ごはんバランスチェッカー</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 p-4 md:p-6">
            <!-- Left: Menu Section (Tabs & Items) -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Tab Navigation -->
                <div id="tab-container" class="flex flex-wrap gap-2 mb-4 justify-center">
                    <!-- Tabs generated by JS -->
                </div>

                <!-- Menu Display -->
                <div id="menu-display" class="bg-gray-50 rounded-[2rem] p-4 md:p-6 border-2 border-gray-100 min-h-[350px]">
                    <div id="active-menu-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3">
                        <!-- Active category items generated by JS -->
                    </div>
                </div>

                <!-- Tray Section -->
                <div class="bg-white rounded-[2rem] p-4 border-4 border-amber-100 shadow-inner">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-lg font-bold text-amber-600 flex items-center">
                            <span class="mr-2 text-2xl">🍽️</span> きみのトレイ
                        </h2>
                        <button onclick="clearTray()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded-full text-xs font-bold shadow-md transition-colors">
                            リセット
                        </button>
                    </div>
                    
                    <div id="tray" class="tray-area rounded-[1.5rem] p-4 flex flex-wrap gap-2 items-center justify-center border-2 border-dashed border-amber-200">
                        <!-- Tray items generated by JS -->
                    </div>
                </div>
            </div>

            <!-- Right: Nutrition Analysis -->
            <div class="lg:col-span-4 space-y-4">
                <div class="bg-amber-50 rounded-[2rem] p-5 border-2 border-amber-200 shadow-sm h-full flex flex-col">
                    <h2 class="text-lg font-bold mb-4 text-center text-gray-700">えいようバランス</h2>
                    
                    <div class="space-y-4 mb-6">
                        <!-- Red -->
                        <div class="bg-white p-3 rounded-xl border-b-4 border-red-400 shadow-sm">
                            <div class="flex justify-between mb-1 items-end">
                                <span class="text-xs font-bold text-red-600">🔴 赤：体をつくる</span>
                                <span id="red-percent" class="text-md font-black text-gray-700">0%</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden border border-red-50">
                                <div id="bar-red" class="nutrient-bar bg-red-500 h-full rounded-full" style="width: 0%"></div>
                            </div>
                        </div>

                        <!-- Yellow -->
                        <div class="bg-white p-3 rounded-xl border-b-4 border-yellow-400 shadow-sm">
                            <div class="flex justify-between mb-1 items-end">
                                <span class="text-xs font-bold text-yellow-600">🟡 黄：エネルギー</span>
                                <span id="yellow-percent" class="text-md font-black text-gray-700">0%</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden border border-yellow-50">
                                <div id="bar-yellow" class="nutrient-bar bg-yellow-400 h-full rounded-full" style="width: 0%"></div>
                            </div>
                        </div>

                        <!-- Green -->
                        <div class="bg-white p-3 rounded-xl border-b-4 border-green-400 shadow-sm">
                            <div class="flex justify-between mb-1 items-end">
                                <span class="text-xs font-bold text-green-600">🟢 緑：調子を整える</span>
                                <span id="green-percent" class="text-md font-black text-gray-700">0%</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden border border-green-50">
                                <div id="bar-green" class="nutrient-bar bg-green-500 h-full rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- New Feedback Message Area -->
                    <div id="feedback-area" class="mb-4 p-4 bg-white rounded-2xl border-2 border-amber-200 shadow-inner flex-grow flex items-center justify-center text-center">
                        <p id="feedback-text" class="text-sm font-bold text-gray-500 italic">メニューをえらんで<br>バランスをチェックしよう！</p>
                    </div>

                    <!-- Reflection Section -->
                    <div class="mt-auto">
                        <label for="reflection" class="block text-sm font-bold text-amber-700 mb-2 flex items-center">
                            <span class="mr-1">📝</span> ふりかえりを書こう！
                        </label>
                        <textarea id="reflection" 
                            class="w-full h-32 p-3 rounded-xl border-2 border-amber-200 focus:border-amber-400 focus:ring-0 text-sm text-gray-700 resize-none shadow-inner bg-white"
                            placeholder="気づいたことを書いてみよう！"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'main', name: '🟡 主食', bgColor: 'bg-yellow-100', activeColor: 'bg-yellow-400', textColor: 'text-yellow-900', icon: '🍚' },
            { id: 'protein', name: '🔴 主菜', bgColor: 'bg-red-100', activeColor: 'bg-red-500', textColor: 'text-red-900', icon: '🍳' },
            { id: 'side', name: '🟢 副菜', bgColor: 'bg-green-100', activeColor: 'bg-green-500', textColor: 'text-green-900', icon: '🥗' },
            { id: 'other', name: '🔵 その他', bgColor: 'bg-blue-100', activeColor: 'bg-blue-500', textColor: 'text-blue-900', icon: '🥛' }
        ];

        const menuItems = [
            // 主食 (Yellow focus)
            { category: 'main', name: '白ごはん', icon: '🍚', r: 10, y: 80, g: 0 },
            { category: 'main', name: 'おにぎり', icon: '🍙', r: 15, y: 80, g: 5 },
            { category: 'main', name: '食パン', icon: '🍞', r: 15, y: 70, g: 0 },
            { category: 'main', name: 'うどん', icon: '🍜', r: 15, y: 75, g: 5 },
            { category: 'main', name: 'コーンフレーク', icon: '🥣', r: 10, y: 65, g: 10 },
            { category: 'main', name: 'クロワッサン', icon: '🥐', r: 10, y: 70, g: 0 },
            { category: 'main', name: 'パンケーキ', icon: '🥞', r: 20, y: 75, g: 0 },
            { category: 'main', name: 'ピザトースト', icon: '🍕', r: 30, y: 65, g: 15 },
            { category: 'main', name: 'フランスパン', icon: '🥖', r: 10, y: 75, g: 0 },
            { category: 'main', name: 'ベーグル', icon: '🥯', r: 15, y: 80, g: 0 },
            { category: 'main', name: '玄米ごはん', icon: '🍚', r: 15, y: 75, g: 10 },
            { category: 'main', name: 'フレンチトースト', icon: '🍞', r: 30, y: 60, g: 0 },
            { category: 'main', name: '焼きそば', icon: '🍝', r: 20, y: 80, g: 20 },
            { category: 'main', name: 'グラノーラ', icon: '🥣', r: 15, y: 60, g: 20 },
            { category: 'main', name: 'サンドイッチ', icon: '🥪', r: 30, y: 60, g: 25 },
            { category: 'main', name: 'お粥', icon: '🥣', r: 5, y: 50, g: 0 },
            
            // 主菜 (Red focus)
            { category: 'protein', name: '目玉焼き', icon: '🍳', r: 50, y: 0, g: 0 },
            { category: 'protein', name: 'ゆでたまご', icon: '🥚', r: 50, y: 0, g: 0 },
            { category: 'protein', name: '厚焼き卵', icon: '🍱', r: 45, y: 5, g: 0 },
            { category: 'protein', name: '焼き鮭', icon: '🐟', r: 60, y: 0, g: 0 },
            { category: 'protein', name: '納豆', icon: '🥜', r: 45, y: 5, g: 5 },
            { category: 'protein', name: 'ウインナー', icon: '🌭', r: 40, y: 0, g: 0 },
            { category: 'protein', name: 'ハンバーグ', icon: '🍘', r: 45, y: 10, g: 10 },
            { category: 'protein', name: 'ハム', icon: '🥓', r: 35, y: 0, g: 0 },
            { category: 'protein', name: 'サバの塩焼き', icon: '🐟', r: 55, y: 0, g: 0 },
            { category: 'protein', name: 'ベーコン', icon: '🥓', r: 35, y: 0, g: 0 },
            { category: 'protein', name: '冷奴', icon: '🧊', r: 40, y: 0, g: 0 },
            { category: 'protein', name: 'から揚げ', icon: '🍗', r: 50, y: 20, g: 0 },
            { category: 'protein', name: 'チキンナゲット', icon: '🐤', r: 40, y: 15, g: 0 },
            { category: 'protein', name: '肉じゃが', icon: '🥘', r: 30, y: 40, g: 20 },
            { category: 'protein', name: 'しらす干し', icon: '🐟', r: 40, y: 0, g: 0 },
            { category: 'protein', name: 'スクランブルエッグ', icon: '🥚', r: 45, y: 5, g: 0 },

            // 副菜 (Green focus)
            { category: 'side', name: 'サラダ', icon: '🥗', r: 5, y: 5, g: 65 },
            { category: 'side', name: 'ポテサラ', icon: '🥔', r: 10, y: 40, g: 30 },
            { category: 'side', name: '味噌汁', icon: '🥣', r: 15, y: 5, g: 25 },
            { category: 'side', name: 'わかめ汁', icon: '🌊', r: 5, y: 0, g: 35 },
            { category: 'side', name: 'コーンスープ', icon: '🌽', r: 10, y: 35, g: 15 },
            { category: 'side', name: 'お浸し', icon: '🥬', r: 10, y: 0, g: 50 },
            { category: 'side', name: 'ブロッコリー', icon: '🥦', r: 15, y: 0, g: 60 },
            { category: 'side', name: 'トマト', icon: '🍅', r: 0, y: 5, g: 55 },
            { category: 'side', name: 'きんぴらごぼう', icon: '🥕', r: 5, y: 15, g: 45 },
            { category: 'side', name: '筑前煮', icon: '🍲', r: 20, y: 20, g: 40 },
            { category: 'side', name: 'ほうれん草和え', icon: '🥬', r: 10, y: 5, g: 55 },
            { category: 'side', name: '焼きのり', icon: '🍱', r: 5, y: 0, g: 30 },
            { category: 'side', name: '小松菜のお浸し', icon: '🌿', r: 10, y: 0, g: 55 },
            { category: 'side', name: 'カボチャ煮', icon: '🎃', r: 5, y: 40, g: 40 },
            { category: 'side', name: '梅干し', icon: '🔴', r: 0, y: 0, g: 10 },
            { category: 'side', name: '漬物', icon: '🥒', r: 0, y: 0, g: 25 },

            // その他 (Mixed)
            { category: 'other', name: '牛乳', icon: '🥛', r: 35, y: 10, g: 10 },
            { category: 'other', name: 'ヨーグルト', icon: '🍦', r: 35, y: 15, g: 0 },
            { category: 'other', name: 'チーズ', icon: '🧀', r: 40, y: 5, g: 0 },
            { category: 'other', name: 'りんご', icon: '🍎', r: 0, y: 10, g: 45 },
            { category: 'other', name: 'バナナ', icon: '🍌', r: 5, y: 40, g: 30 },
            { category: 'other', name: 'オレンジ', icon: '🍊', r: 0, y: 10, g: 50 },
            { category: 'other', name: 'イチゴ', icon: '🍓', r: 0, y: 5, g: 55 },
            { category: 'other', name: '野菜ジュース', icon: '🥤', r: 5, y: 15, g: 45 },
            { category: 'other', name: 'ココア', icon: '☕', r: 15, y: 20, g: 5 },
            { category: 'other', name: 'ヤクルト', icon: '🍼', r: 10, y: 20, g: 0 },
            { category: 'other', name: 'キウイ', icon: '🥝', r: 0, y: 10, g: 60 },
            { category: 'other', name: 'グレープフルーツ', icon: '🍈', r: 0, y: 10, g: 55 },
            { category: 'other', name: 'ナッツ', icon: '🥜', r: 20, y: 10, g: 15 },
            { category: 'other', name: 'はちみつ', icon: '🍯', r: 0, y: 30, g: 0 },
            { category: 'other', name: 'ジャム', icon: '🍓', r: 0, y: 30, g: 5 },
            { category: 'other', name: '麦茶', icon: '🍵', r: 0, y: 0, g: 5 }
        ];

        let selectedItems = [];
        let activeCategoryId = 'main';

        function init() {
            renderTabs();
            renderActiveMenu();
            renderTray();
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                const isActive = cat.id === activeCategoryId;
                btn.className = `tab-btn px-4 py-2 rounded-full font-bold text-sm flex items-center gap-1 ${isActive ? cat.activeColor + ' text-white active' : cat.bgColor + ' ' + cat.textColor}`;
                btn.innerHTML = `<span>${cat.icon}</span> ${cat.name}`;
                btn.onclick = () => {
                    activeCategoryId = cat.id;
                    renderTabs();
                    renderActiveMenu();
                };
                container.appendChild(btn);
            });
        }

        function renderActiveMenu() {
            const grid = document.getElementById('active-menu-grid');
            grid.innerHTML = '';
            
            const items = menuItems.filter(i => i.category === activeCategoryId);
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'food-card bg-white border-2 border-gray-100 rounded-2xl p-2 text-center flex flex-col items-center justify-center hover:border-amber-400 hover:shadow-sm min-h-[85px]';
                card.innerHTML = `
                    <div class="text-3xl mb-1">${item.icon}</div>
                    <div class="text-[10px] font-bold text-gray-700 leading-tight">${item.name}</div>
                `;
                card.onclick = () => addToTray(item);
                grid.appendChild(card);
            });
        }

        function addToTray(item) {
            if (selectedItems.length >= 15) return;
            selectedItems.push(item);
            renderTray();
            updateNutrition();
        }

        function removeFromTray(index) {
            selectedItems.splice(index, 1);
            renderTray();
            updateNutrition();
        }

        function clearTray() {
            selectedItems = [];
            renderTray();
            updateNutrition();
        }

        function renderTray() {
            const tray = document.getElementById('tray');
            tray.innerHTML = '';
            
            if (selectedItems.length === 0) {
                tray.innerHTML = '<p class="text-gray-400 font-bold text-sm">メニューをえらんでね！</p>';
                return;
            }

            selectedItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'pop-in relative bg-white w-14 h-14 md:w-16 md:h-16 rounded-2xl border-2 border-amber-400 flex items-center justify-center text-3xl shadow-md cursor-pointer hover:bg-red-50 group';
                div.innerHTML = `
                    <span>${item.icon}</span>
                    <div class="absolute -top-1 -right-1 bg-red-600 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity font-bold shadow-md">✕</div>
                `;
                div.onclick = () => removeFromTray(index);
                tray.appendChild(div);
            });
        }

        function updateNutrition() {
            let totalR = 0, totalY = 0, totalG = 0;
            selectedItems.forEach(item => {
                totalR += item.r;
                totalY += item.y;
                totalG += item.g;
            });

            const r = Math.min(Math.round(totalR), 100);
            const y = Math.min(Math.round(totalY), 100);
            const g = Math.min(Math.round(totalG), 100);

            document.getElementById('bar-red').style.width = r + '%';
            document.getElementById('bar-yellow').style.width = y + '%';
            document.getElementById('bar-green').style.width = g + '%';

            document.getElementById('red-percent').innerText = r + '%';
            document.getElementById('yellow-percent').innerText = y + '%';
            document.getElementById('green-percent').innerText = g + '%';

            updateFeedback(r, y, g);
        }

        function updateFeedback(r, y, g) {
            const feedbackText = document.getElementById('feedback-text');
            const feedbackArea = document.getElementById('feedback-area');
            
            if (selectedItems.length === 0) {
                feedbackText.innerHTML = "メニューをえらんでね！";
                feedbackArea.className = "mb-4 p-4 bg-white rounded-2xl border-2 border-amber-200 shadow-inner flex-grow flex items-center justify-center text-center";
                return;
            }

            let message = "";
            let bgColor = "bg-white";
            let borderColor = "border-amber-200";
            let textColor = "text-gray-700";

            if (r >= 85 && y >= 85 && g >= 85) {
                message = "✨ 完ぺき！！<br>最高のバランスだね！";
                bgColor = "bg-green-50";
                borderColor = "border-green-400";
                textColor = "text-green-700";
            } else if (r >= 60 && y >= 60 && g >= 60) {
                message = "👍 いい感じ！<br>さらに良くなるよ！";
                bgColor = "bg-blue-50";
                borderColor = "border-blue-300";
                textColor = "text-blue-700";
            } else {
                // 不足している色を指摘
                let missing = [];
                if (r < 60) missing.push("🔴赤");
                if (y < 60) missing.push("🟡黄");
                if (g < 60) missing.push("🟢緑");
                
                message = `${missing.join('・')}のメニューを<br>増やしてみよう！`;
                bgColor = "bg-amber-50";
                borderColor = "border-amber-300";
            }

            feedbackText.innerHTML = message;
            feedbackArea.className = `mb-4 p-4 ${bgColor} rounded-2xl border-2 ${borderColor} shadow-inner flex-grow flex items-center justify-center text-center ${textColor}`;
        }

        window.onload = init;
    </script>
</body>
</html>
